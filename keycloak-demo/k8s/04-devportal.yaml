# IMPORTANT: Replace YOUR_AWS_ACCOUNT_ID and YOUR_REGION before applying
# Example: 075729034361.dkr.ecr.ap-south-1.amazonaws.com/devportal:latest
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devportal
  namespace: keycloak-demo
  labels:
    app: devportal
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devportal
  template:
    metadata:
      labels:
        app: devportal
    spec:
      containers:
        - name: devportal
          image: YOUR_AWS_ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/devportal:latest
          ports:
            - containerPort: 80
          env:
            - name: KEYCLOAK_URL
              value: "http://INGRESS_IP/auth"  # Replace INGRESS_IP after Step 8
            - name: KEYCLOAK_REALM
              value: "devportal"
            - name: KEYCLOAK_CLIENT_ID
              value: "devportal-app"
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: devportal
  namespace: keycloak-demo
spec:
  selector:
    app: devportal
  ports:
    - port: 80
      targetPort: 80
