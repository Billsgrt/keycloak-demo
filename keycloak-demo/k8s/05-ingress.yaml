apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devportal-ingress
  namespace: keycloak-demo
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
    # Required for Keycloak — increases header buffer size for large tokens
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
spec:
  rules:
    - http:
        paths:
          # Keycloak auth server — must come before /
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080
          # React DevPortal app
          - path: /
            pathType: Prefix
            backend:
              service:
                name: devportal
                port:
                  number: 80
